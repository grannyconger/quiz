<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Which Pit Crew Team Are You?</title>
  <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FDF7F0;
      --bg2: #FFF3E8;
      --card: #FFFFFF;
      --card2: #FFF8F2;
      --text: #1A2744;
      --text2: #4A5568;
      --muted: #8A96A8;
      --border: #E8E0D8;
      --orange: #F2640A;
      --orange-light: #FF8C42;
      --orange-pale: #FFF0E6;
      --orange-mid: #FFD4B8;
      --blue: #1348A0;
      --blue-mid: #2563EB;
      --blue-light: #60A5FA;
      --blue-pale: #EFF6FF;
      --amber: #F59E0B;
      --shadow-sm: 0 1px 4px rgba(26,39,68,0.06), 0 2px 8px rgba(26,39,68,0.04);
      --shadow-md: 0 4px 16px rgba(26,39,68,0.10), 0 1px 4px rgba(26,39,68,0.06);
      --shadow-lg: 0 8px 32px rgba(26,39,68,0.12), 0 2px 8px rgba(26,39,68,0.06);
      --radius: 16px;
      --font-display: 'Righteous', cursive;
      --font-body: 'Nunito', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle flame background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(242,100,10,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 85% 90%, rgba(19,72,160,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,158,11,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px 56px;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: var(--border);
      z-index: 100;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--orange), var(--amber), var(--blue-mid));
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 0 4px 4px 0;
    }

    /* ── SCREENS ── */
    .screen { display: none; width: 100%; max-width: 600px; }
    .screen.active { display: flex; flex-direction: column; align-items: center; }

    /* ── INTRO SCREEN ── */
    .intro-eyebrow {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 14px;
    }

    .intro-title {
      font-family: var(--font-display);
      font-size: clamp(38px, 10vw, 62px);
      line-height: 1.05;
      text-align: center;
      margin-bottom: 10px;
      color: var(--text);
    }

    .intro-title span.flame {
      background: linear-gradient(135deg, var(--orange) 0%, var(--amber) 60%, var(--blue-mid) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro-sub {
      font-size: clamp(15px, 4vw, 17px);
      color: var(--text2);
      text-align: center;
      margin-bottom: 32px;
      max-width: 380px;
      line-height: 1.6;
    }

    .team-grid-intro {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      margin-bottom: 36px;
    }

    .team-card-intro {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .team-card-intro:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }

    .team-card-intro .t-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
    .team-card-intro .t-name {
      font-family: var(--font-display);
      font-size: 13px;
      color: var(--text);
    }

    /* ── BUTTONS ── */
    .btn {
      font-family: var(--font-display);
      font-size: 17px;
      letter-spacing: 0.5px;
      padding: 16px 48px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      color: #fff;
      box-shadow: 0 4px 20px rgba(242,100,10,0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(242,100,10,0.45);
      transform: translateY(-2px);
    }

    .btn-restart {
      background: var(--card);
      color: var(--text2);
      border: 1.5px solid var(--border);
      font-size: 14px;
      padding: 12px 32px;
      margin-top: 16px;
      box-shadow: var(--shadow-sm);
    }
    .btn-restart:hover { border-color: var(--orange-light); color: var(--orange); }

    /* ── QUESTION SCREEN ── */
    .q-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .q-step {
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--orange);
    }

    .q-count-badge {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 4px 14px;
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--text2);
      box-shadow: var(--shadow-sm);
    }

    .q-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(20px, 5vw, 36px);
      width: 100%;
      box-shadow: var(--shadow-md);
      position: relative;
      overflow: hidden;
    }

    .q-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--amber), var(--blue-mid));
    }

    .q-emoji {
      font-size: 32px;
      margin-bottom: 12px;
      display: block;
    }

    .q-text {
      font-size: clamp(17px, 4.5vw, 22px);
      font-weight: 800;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 24px;
    }

    /* ── 2x2 ANSWER GRID ── */
    .answers-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .answer-tile {
      background: var(--bg2);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      text-align: center;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: clamp(13px, 3.2vw, 15px);
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.18s ease, background 0.18s ease, transform 0.12s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .answer-tile:hover {
      border-color: var(--orange-light);
      background: var(--orange-pale);
      transform: translateY(-2px);
      box-shadow: var(--shadow-sm);
    }

    .answer-tile:active {
      transform: scale(0.97);
    }

    .answer-tile.selected {
      background: linear-gradient(135deg, var(--orange), var(--amber));
      border-color: var(--orange);
      color: #fff;
      box-shadow: 0 4px 18px rgba(242,100,10,0.28);
      transform: scale(1.02);
    }

    .answer-tile.faded {
      opacity: 0.35;
      pointer-events: none;
    }

    /* Ripple */
    .answer-tile .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(242,100,10,0.2);
      transform: scale(0);
      animation: ripple-out 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple-out {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── RESULT SCREEN ── */
    .result-badge {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 16px;
      border: 3px solid;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    .result-badge::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 2px solid;
      opacity: 0.25;
      animation: pulse-ring 2s ease-in-out infinite;
    }

    @keyframes pulse-ring {
      0%, 100% { transform: scale(1); opacity: 0.25; }
      50% { transform: scale(1.1); opacity: 0.08; }
    }

    .result-label {
      font-family: var(--font-display);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--orange);
    }

    .result-team {
      font-family: var(--font-display);
      font-size: clamp(30px, 8vw, 48px);
      text-align: center;
      line-height: 1.1;
      margin-bottom: 20px;
      color: var(--text);
    }

    .result-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: clamp(22px, 5vw, 36px);
      width: 100%;
      text-align: center;
      box-shadow: var(--shadow-lg);
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }

    .result-tagline {
      font-size: clamp(14px, 3.5vw, 16px);
      font-weight: 800;
      font-style: italic;
      margin-bottom: 14px;
      color: var(--orange);
    }

    .result-desc {
      font-size: clamp(14px, 3.5vw, 16px);
      line-height: 1.75;
      color: var(--text2);
      margin-bottom: 22px;
    }

    .result-traits {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-bottom: 26px;
    }

    .trait-tag {
      padding: 6px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.5px;
      border: 1.5px solid;
      background: var(--orange-pale);
      color: var(--orange);
      border-color: var(--orange-mid);
    }

    .score-section { width: 100%; }
    .score-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .score-rows { display: flex; flex-direction: column; gap: 8px; }
    .score-row { display: flex; align-items: center; gap: 10px; }
    .score-row-name {
      font-family: var(--font-display);
      font-size: 11px;
      width: 110px;
      text-align: right;
      flex-shrink: 0;
      color: var(--text2);
    }
    .score-row-track {
      flex: 1;
      height: 8px;
      background: var(--bg2);
      border-radius: 99px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .score-row-fill {
      height: 100%;
      border-radius: 99px;
      width: 0%;
      transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .score-row-num {
      font-family: var(--font-display);
      font-size: 11px;
      color: var(--muted);
      width: 18px;
      text-align: left;
      flex-shrink: 0;
    }

    /* ── CONFETTI ── */
    .confetti-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    @media (max-width: 400px) {
      .answer-tile { font-size: 12px; padding: 12px 10px; min-height: 80px; }
      .answers-grid { gap: 8px; }
    }
  </style>
</head>
<body>

<canvas class="confetti-canvas" id="confettiCanvas"></canvas>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>

<div class="wrapper">

  <!-- ══ INTRO SCREEN ══ -->
  <div class="screen active" id="screen-intro">
    <p class="intro-eyebrow">Pit Crew</p>
    <h1 class="intro-title">Which Team<br>Are <span class="flame">You?</span></h1>
    <p class="intro-sub">15 questions. No wrong answers. Discover which team might be the best fit for you.</p>
    <div class="team-grid-intro">
      <div class="team-card-intro">
        <span class="t-emoji">🎤</span>
        <span class="t-name">Game Masters</span>
      </div>
      <div class="team-card-intro">
        <span class="t-emoji">⚓</span>
        <span class="t-name">Anchors</span>
      </div>
      <div class="team-card-intro">
        <span class="t-emoji">🎛️</span>
        <span class="t-name">Production</span>
      </div>
      <div class="team-card-intro">
        <span class="t-emoji">📋</span>
        <span class="t-name">Promo</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">Let's Find Out</button>
  </div>

  <!-- ══ QUESTION SCREEN ══ -->
  <div class="screen" id="screen-question">
    <div class="q-header">
      <span class="q-step" id="qStep">Question 1</span>
      <span class="q-count-badge" id="qCount">1 of 15</span>
    </div>
    <div class="q-card" id="qCard">
      <span class="q-emoji" id="qEmoji">🎯</span>
      <p class="q-text" id="qText"></p>
      <div class="answers-grid" id="answersGrid"></div>
    </div>
  </div>

  <!-- ══ RESULT SCREEN ══ -->
  <div class="screen" id="screen-result">
    <div class="result-badge" id="resultBadge"></div>
    <p class="result-label">You Might Be a Good Fit For...</p>
    <h2 class="result-team" id="resultTeam"></h2>
    <div class="result-card" id="resultCard">
      <p class="result-tagline" id="resultTagline"></p>
      <p class="result-desc" id="resultDesc"></p>
      <div class="result-traits" id="resultTraits"></div>
      <div class="score-section">
        <p class="score-label">How You Scored</p>
        <div class="score-rows" id="scoreBars"></div>
      </div>
    </div>
    <button class="btn btn-restart" onclick="restartQuiz()">Take It Again</button>
  </div>

</div>

<script>
  // ─────────────────────────── SOUND ───────────────────────────

  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function playClick() {
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(340, ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.13);
    } catch(e) {}
  }

  function playSuccess() {
    try {
      const ctx = getAudioCtx();
      [0, 0.08, 0.18].forEach((t, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        const notes = [520, 660, 780];
        osc.frequency.setValueAtTime(notes[i], ctx.currentTime + t);
        gain.gain.setValueAtTime(0.14, ctx.currentTime + t);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.18);
        osc.start(ctx.currentTime + t);
        osc.stop(ctx.currentTime + t + 0.2);
      });
    } catch(e) {}
  }

  // ─────────────────────────── DATA ───────────────────────────

  const TEAMS = {
    GM: {
      name: 'Game Masters',
      emoji: '🎤',
      color: '#F2640A',
      bgColor: '#FFF0E6',
      borderColor: '#FFB899',
      tagline: '"The room already listens. We just give them a reason."',
      desc: 'Game Master might be your team. Ring announcer energy, people already follow your lead before you say a word, and we just gave you a mic. If you are quick-witted, unafraid to look a little ridiculous, and you thrive in the beautiful chaos of a live crowd, this could be your home. Script the structure, own the personality, and always have a Plan B. The front might be exactly where you belong.',
      traits: ['Quick-Witted', 'Crowd First', 'Risk Taker', 'Unscripted Energy', 'Natural Influencer'],
      barColor: '#F2640A'
    },
    AN: {
      name: 'Anchors',
      emoji: '⚓',
      color: '#1348A0',
      bgColor: '#EFF6FF',
      borderColor: '#BFDBFE',
      tagline: '"Everyone feels the energy. You make sure nobody gets left behind."',
      desc: 'Anchors might be your team. If you bring warm, magnetic, big brother and big sister energy, and people just naturally trust you the moment you walk in, this role was built for someone like you. You captivate without performing, hold the room together between the big moments, and make everyone feel like they belong. Confident, connective, and genuinely memorable.',
      traits: ['Warm and Magnetic', 'Confident Speaker', 'Captivating', 'Flow Master', 'People First'],
      barColor: '#2563EB'
    },
    PR: {
      name: 'Production',
      emoji: '🎛️',
      color: '#7C3AED',
      bgColor: '#F5F3FF',
      borderColor: '#DDD6FE',
      tagline: '"Nobody knows what we do. That\'s exactly how we like it."',
      desc: 'Production might be your team. If you are the quirky, technically curious type who hyperfocuses on the cool stuff, lets some details slide, and somehow pulls it all together, this could be your lane. A little literal, a little sarcastic, and fully capable of spending 90 minutes perfecting something nobody asked for with zero regrets. The vibe is the domain, and the vibe is everything.',
      traits: ['Technically Gifted', 'Creatively Chaotic', 'Dry Humor', 'Atmosphere Architect', 'Hyperfocused'],
      barColor: '#7C3AED'
    },
    PO: {
      name: 'Promo',
      emoji: '📋',
      color: '#065F46',
      bgColor: '#ECFDF5',
      borderColor: '#A7F3D0',
      tagline: '"Without us, it\'s just a really good idea."',
      desc: 'Promo might be your team. If you naturally work backwards from the deadline, love owning the full story on social media before and after the big moment, and get genuinely motivated by a checklist, this could be a great fit. Creative and execution-focused is a rare combo, and Promo needs both. The kind of person who makes plans actually happen.',
      traits: ['Execution Focused', 'Big Picture Thinker', 'Decisive', 'Social Storyteller', 'The Glue'],
      barColor: '#059669'
    }
  };

  const EMOJIS = ['🎯','🎪','🎭','🎬','🎮','🎲','🧩','🎸','🎺','⚡','🔥','💥','🎊','🌀','🎨'];

  const QUESTIONS = [
    {
      text: "Someone unexpectedly hands you a microphone in front of 400 people. Your first instinct is...",
      answers: [
        { text: "Say something, anything. You'll figure out the rest as you go.", team: 'GM' },
        { text: "Light up. This is actually your element.", team: 'AN' },
        { text: "Wish you had a soundboard and entrance music ready.", team: 'PR' },
        { text: "Wish someone had warned you so you could have prepared something.", team: 'PO' }
      ]
    },
    {
      text: "There's an awkward silence in a group setting. You...",
      answers: [
        { text: "Break it with a joke or a question, loudly.", team: 'GM' },
        { text: "Jump in and get everyone talking again like it's nothing.", team: 'AN' },
        { text: "Say something slightly weird, laugh at yourself, then somehow overshare.", team: 'PR' },
        { text: "Already had a talking point ready just in case.", team: 'PO' }
      ]
    },
    {
      text: "You're at a party. Where are people most likely to find you?",
      answers: [
        { text: "Center of the room, in the middle of a story.", team: 'GM' },
        { text: "Floating around, pulling people into the same conversation.", team: 'AN' },
        { text: "Near the speaker, quietly judging the playlist.", team: 'PR' },
        { text: "Working the room with a purpose, making connections.", team: 'PO' }
      ]
    },
    {
      text: "Pick the heist movie role that fits you best.",
      answers: [
        { text: "The Distraction: charismatic, unpredictable, everyone's watching them.", team: 'GM' },
        { text: "The Face: charming, trustworthy, gets anyone to open the door.", team: 'AN' },
        { text: "The Hacker: nobody knows what they're doing until it works.", team: 'PR' },
        { text: "The Mastermind: built the plan, knows every detail, delegated the rest.", team: 'PO' }
      ]
    },
    {
      text: "Your group project is due tomorrow and nobody has started. You...",
      answers: [
        { text: "Rally everyone with energy and enthusiasm, figure out assignments on the fly.", team: 'GM' },
        { text: "Get everyone in a room, hype them up, and make it feel like a team mission.", team: 'AN' },
        { text: "Already spent four hours on one optional section and have nothing else done.", team: 'PR' },
        { text: "Build a quick shared doc, assign tasks, and set a midnight deadline.", team: 'PO' }
      ]
    },
    {
      text: "You're watching a movie. What do you notice first?",
      answers: [
        { text: "How the audience around you is reacting.", team: 'GM' },
        { text: "Whether the characters feel real and relatable.", team: 'AN' },
        { text: "The vibes.", team: 'PR' },
        { text: "Whether the story structure actually makes sense.", team: 'PO' }
      ]
    },
    {
      text: "Something important runs 10 minutes over schedule. You feel...",
      answers: [
        { text: "Restless. Let's wrap it up or make it interesting.", team: 'GM' },
        { text: "Unbothered. You'll keep the energy up regardless.", team: 'AN' },
        { text: "You got distracted building something cool and didn't notice.", team: 'PR' },
        { text: "Annoyed. This is exactly why you wanted a detailed timeline.", team: 'PO' }
      ]
    },
    {
      text: "Pick the thing that would stress you out most if it went wrong at an important moment.",
      answers: [
        { text: "Nobody laughing or responding.", team: 'GM' },
        { text: "The energy dying and nobody knowing how to bring it back.", team: 'AN' },
        { text: "A technical failure nobody can fix in time.", team: 'PR' },
        { text: "Something that was supposed to be handled not being handled.", team: 'PO' }
      ]
    },
    {
      text: "What's on your dresser or in your car trunk?",
      answers: [
        { text: "Random costume pieces, props, and at least one thing you forgot to return to someone.", team: 'GM' },
        { text: "Stuff that belongs to other people that you've been meaning to return.", team: 'AN' },
        { text: "Something nobody recognizes and one thing that definitely shouldn't be there.", team: 'PR' },
        { text: "A tote bag with most of what you need and a list of what you forgot.", team: 'PO' }
      ]
    },
    {
      text: "Someone calls you \"extra.\" You take it as...",
      answers: [
        { text: "A compliment, obviously.", team: 'GM' },
        { text: "Weird. You were just being yourself.", team: 'AN' },
        { text: "Fair, honestly.", team: 'PR' },
        { text: "You've been called worse, and things still got done.", team: 'PO' }
      ]
    },
    {
      text: "Your friend group is lost with no GPS. You...",
      answers: [
        { text: "Make it an adventure and keep everyone's spirits high.", team: 'GM' },
        { text: "Take charge confidently and figure it out on the move.", team: 'AN' },
        { text: "Already downloaded the offline map before you left but forgot to mention it.", team: 'PR' },
        { text: "Try to recall the itinerary you wish you had printed.", team: 'PO' }
      ]
    },
    {
      text: "Pick your seat on a school bus.",
      answers: [
        { text: "Very back. No further questions.", team: 'GM' },
        { text: "Wherever the most people are so you can talk to everyone.", team: 'AN' },
        { text: "Window seat, headphones in, staring outside.", team: 'PR' },
        { text: "Front seat, already thinking about the destination.", team: 'PO' }
      ]
    },
    {
      text: "You find $100 with no strings attached. First thought?",
      answers: [
        { text: "Who wants to do something fun tonight?", team: 'GM' },
        { text: "How can I use this to do something with the people I care about.", team: 'AN' },
        { text: "Already know which app, plugin, or software subscription you're getting.", team: 'PR' },
        { text: "Already thinking about how to stretch it into something bigger.", team: 'PO' }
      ]
    },
    {
      text: "Your superpower would most likely be...",
      answers: [
        { text: "Instant crowd control: anyone you speak to is immediately engaged.", team: 'GM' },
        { text: "Making anyone feel welcome and energized the second they walk in.", team: 'AN' },
        { text: "The ability to fix absolutely anything on the spot.", team: 'PR' },
        { text: "Foresight: you can see exactly how things will unfold before they happen.", team: 'PO' }
      ]
    },
    {
      text: "What's your worst nightmare?",
      answers: [
        { text: "Landing a joke to complete silence.", team: 'GM' },
        { text: "Talking for five minutes and realizing the room checked out.", team: 'AN' },
        { text: "The aux cord getting unplugged during the best part of the song.", team: 'PR' },
        { text: "Showing up and realizing nobody did what they said they were going to do.", team: 'PO' }
      ]
    }
  ];

  // ─────────────────────────── STATE ───────────────────────────

  let currentQ = 0;
  let scores = { GM: 0, AN: 0, PR: 0, PO: 0 };
  let answered = false;

  // ─────────────────────────── HELPERS ───────────────────────────

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function addRipple(el, e) {
    const rect = el.getBoundingClientRect();
    const x = (e.clientX || e.touches?.[0]?.clientX || rect.left + rect.width / 2) - rect.left;
    const y = (e.clientY || e.touches?.[0]?.clientY || rect.top + rect.height / 2) - rect.top;
    const size = Math.max(rect.width, rect.height) * 1.5;
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    ripple.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
    el.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  }

  // ─────────────────────────── QUIZ ───────────────────────────

  function startQuiz() {
    playClick();
    currentQ = 0;
    scores = { GM: 0, AN: 0, PR: 0, PO: 0 };
    answered = false;
    showScreen('screen-question');
    loadQuestion(true);
  }

  function loadQuestion(isFirst = false) {
    answered = false;
    const q = QUESTIONS[currentQ];
    const shuffled = shuffle(q.answers);

    document.getElementById('qStep').textContent = `Question ${currentQ + 1}`;
    document.getElementById('qCount').textContent = `${currentQ + 1} of ${QUESTIONS.length}`;
    document.getElementById('qEmoji').textContent = EMOJIS[currentQ];
    document.getElementById('qText').textContent = q.text;

    const pct = (currentQ / QUESTIONS.length) * 100;
    document.getElementById('progressFill').style.width = pct + '%';

    const grid = document.getElementById('answersGrid');
    grid.innerHTML = '';

    shuffled.forEach((ans) => {
      const tile = document.createElement('button');
      tile.className = 'answer-tile';
      tile.textContent = ans.text;
      tile.setAttribute('data-team', ans.team);
      tile.style.opacity = '0';
      tile.style.transform = 'scale(0.92)';
      tile.addEventListener('click', (e) => {
        addRipple(tile, e);
        selectAnswer(tile, ans.team);
      });
      grid.appendChild(tile);
    });

    const card = document.getElementById('qCard');
    gsap.fromTo(card,
      { opacity: 0, x: isFirst ? 0 : 50, y: isFirst ? 16 : 0 },
      { opacity: 1, x: 0, y: 0, duration: 0.35, ease: 'power2.out' }
    );

    const tiles = grid.querySelectorAll('.answer-tile');
    gsap.to(tiles, {
      opacity: 1,
      scale: 1,
      duration: 0.28,
      stagger: 0.07,
      delay: 0.15,
      ease: 'back.out(1.4)'
    });
  }

  function selectAnswer(tile, team) {
    if (answered) return;
    answered = true;
    playClick();

    scores[team]++;
    tile.classList.add('selected');

    document.querySelectorAll('.answer-tile').forEach(t => {
      if (t !== tile) t.classList.add('faded');
    });

    gsap.fromTo(tile, { scale: 1.02 }, { scale: 1, duration: 0.25, ease: 'elastic.out(1, 0.5)' });

    setTimeout(() => {
      if (currentQ < QUESTIONS.length - 1) {
        const card = document.getElementById('qCard');
        gsap.to(card, {
          opacity: 0, x: -50, duration: 0.28, ease: 'power2.in',
          onComplete: () => { currentQ++; loadQuestion(); }
        });
      } else {
        playSuccess();
        showResult();
      }
    }, 550);
  }

  function showResult() {
    document.getElementById('progressFill').style.width = '100%';

    const winner = Object.entries(scores).reduce((a, b) => b[1] > a[1] ? b : a)[0];
    const team = TEAMS[winner];

    const badge = document.getElementById('resultBadge');
    badge.textContent = team.emoji;
    badge.style.borderColor = team.color;
    badge.style.background = team.bgColor;
    badge.style.boxShadow = `0 8px 32px ${team.color}33`;

    document.getElementById('resultTeam').textContent = team.name;
    document.getElementById('resultTeam').style.color = team.color;

    const card = document.getElementById('resultCard');
    card.style.borderColor = team.borderColor;
    card.querySelector('::before') ? null : null;
    // Set top bar color via a pseudo workaround
    card.style.setProperty('--team-color', team.color);
    const style = document.createElement('style');
    style.textContent = `.result-card::before { background: linear-gradient(90deg, ${team.color}, ${team.barColor}88) !important; }`;
    document.head.appendChild(style);

    document.getElementById('resultTagline').textContent = team.tagline;
    document.getElementById('resultTagline').style.color = team.color;
    document.getElementById('resultDesc').textContent = team.desc;

    const traitsEl = document.getElementById('resultTraits');
    traitsEl.innerHTML = '';
    team.traits.forEach(t => {
      const tag = document.createElement('span');
      tag.className = 'trait-tag';
      tag.textContent = t;
      tag.style.color = team.color;
      tag.style.borderColor = team.borderColor;
      tag.style.background = team.bgColor;
      traitsEl.appendChild(tag);
    });

    const scoreBarsEl = document.getElementById('scoreBars');
    scoreBarsEl.innerHTML = '';
    const total = QUESTIONS.length;
    ['GM','AN','PR','PO'].forEach(t => {
      const td = TEAMS[t];
      const row = document.createElement('div');
      row.className = 'score-row';
      row.innerHTML = `
        <span class="score-row-name">${td.emoji} ${td.name}</span>
        <div class="score-row-track">
          <div class="score-row-fill" style="background:${td.barColor}" data-pct="${(scores[t]/total)*100}"></div>
        </div>
        <span class="score-row-num">${scores[t]}</span>
      `;
      scoreBarsEl.appendChild(row);
    });

    showScreen('screen-result');

    const els = ['resultBadge','resultTeam','resultCard'].map(id => document.getElementById(id));
    gsap.fromTo(els,
      { opacity: 0, y: 28, scale: 0.96 },
      { opacity: 1, y: 0, scale: 1, duration: 0.5, stagger: 0.1, ease: 'back.out(1.4)', delay: 0.1 }
    );

    setTimeout(() => {
      document.querySelectorAll('.score-row-fill').forEach(fill => {
        fill.style.width = fill.getAttribute('data-pct') + '%';
      });
    }, 600);

    launchConfetti(team.color);
  }

  function restartQuiz() {
    playClick();
    const canvas = document.getElementById('confettiCanvas');
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    document.getElementById('progressFill').style.width = '0%';
    showScreen('screen-intro');
  }

  // ─────────────────────────── CONFETTI ───────────────────────────

  let confettiFrame;

  function launchConfetti(teamColor) {
    const canvas = document.getElementById('confettiCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = [teamColor, '#F2640A', '#F59E0B', '#1348A0', '#60A5FA', '#ffffff'];
    const particles = Array.from({ length: 100 }, () => ({
      x: Math.random() * canvas.width,
      y: -20,
      w: 5 + Math.random() * 7,
      h: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      speed: 2.5 + Math.random() * 3.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 5
    }));

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      particles.forEach(p => {
        p.y += p.speed;
        p.x += Math.sin(p.angle * 0.04) * 1.5;
        p.angle += p.spin;
        if (p.y < canvas.height + 20) alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - p.y / canvas.height * 1.1);
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
      });
      if (alive) confettiFrame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    if (confettiFrame) cancelAnimationFrame(confettiFrame);
    draw();
  }

  // ─────────────────────────── INIT ───────────────────────────

  window.addEventListener('load', () => {
    const els = document.querySelectorAll('#screen-intro > *');
    gsap.fromTo(els,
      { opacity: 0, y: 20 },
      { opacity: 1, y: 0, duration: 0.55, stagger: 0.1, ease: 'power2.out' }
    );
  });
</script>
